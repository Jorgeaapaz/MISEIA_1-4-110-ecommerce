name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: NODE_ENV=production npm run build

  deploy:
    name: Deploy to GCI VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 34.174.56.186 >> ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          ssh gcvmuser@34.174.56.186 << 'ENDSSH'
            set -e
            APP_DIR=~/MISEIA110_ecommerce

            # Clone repo if it doesn't exist, otherwise pull latest
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/Jorgeaapaz/MISEIA_1-4-110-ecommerce.git "$APP_DIR"
            else
              cd "$APP_DIR" && git pull origin main
            fi

            cd "$APP_DIR"

            # Build Docker image
            docker build -t ecommerce:latest .

            # Stop and remove existing container
            docker stop ecommerce 2>/dev/null || true
            docker rm ecommerce 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ecommerce \
              --network miseia-net \
              --restart unless-stopped \
              -e MONGODB_URI="${{ env.MONGODB_URI }}" \
              -e MONGODB_DB="${{ env.MONGODB_DB }}" \
              -e AUTH_SECRET="${{ env.AUTH_SECRET }}" \
              -e NEXT_PUBLIC_BASE_URL="${{ env.NEXT_PUBLIC_BASE_URL }}" \
              -e NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${{ env.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" \
              -e STRIPE_PUBLISHABLE_KEY="${{ env.STRIPE_PUBLISHABLE_KEY }}" \
              -e STRIPE_SECRET_KEY="${{ env.STRIPE_SECRET_KEY }}" \
              -e STRIPE_WEBHOOK_SECRET="${{ env.STRIPE_WEBHOOK_SECRET }}" \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.ecommerce.rule=Host(\`ecommerce.deviaaps.com\`)" \
              -l "traefik.http.routers.ecommerce.entrypoints=websecure" \
              -l "traefik.http.routers.ecommerce.tls=true" \
              -l "traefik.http.routers.ecommerce.tls.certresolver=cloudflare" \
              -l "traefik.http.services.ecommerce.loadbalancer.server.port=30001" \
              ecommerce:latest

            echo "Deploy complete — container status:"
            docker ps --filter name=ecommerce --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          ENDSSH
