stages:
  - test
  - build
  - deploy

lint-and-test:
  stage: test
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

build:
  stage: build
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - export NODE_ENV=production && npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan 34.174.56.186 >> ~/.ssh/known_hosts
  script:
    # Write deploy script to VM, then execute it.
    # Using a script file avoids backtick-in-heredoc shell escaping issues
    # with the Traefik Host() label.
    - |
      ssh gcvmuser@34.174.56.186 "cat > /tmp/deploy_ecommerce.sh" << 'SCRIPT'
      #!/bin/bash
      set -e
      APP_DIR=~/MISEIA110_ecommerce
      if [ ! -d "$APP_DIR" ]; then
        git clone https://github.com/Jorgeaapaz/MISEIA_1-4-110-ecommerce.git "$APP_DIR"
      else
        cd "$APP_DIR" && git pull origin main
      fi
      cd "$APP_DIR"
      docker build -t ecommerce:latest .
      docker stop ecommerce 2>/dev/null || true
      docker rm ecommerce 2>/dev/null || true
      TRAEFIK_RULE='traefik.http.routers.ecommerce.rule=Host(`ecommerce.deviaaps.com`)'
      docker run -d \
        --name ecommerce \
        --network miseia-net \
        --restart unless-stopped \
        --env-file ~/MISEIA110_ecommerce/.env.production \
        --label traefik.enable=true \
        --label "$TRAEFIK_RULE" \
        --label traefik.http.routers.ecommerce.entrypoints=websecure \
        --label traefik.http.routers.ecommerce.tls=true \
        --label traefik.http.routers.ecommerce.tls.certresolver=cloudflare \
        --label traefik.http.services.ecommerce.loadbalancer.server.port=30001 \
        ecommerce:latest
      echo "Deploy complete — container status:"
      docker ps --filter name=ecommerce --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
      SCRIPT
    - ssh gcvmuser@34.174.56.186 "bash /tmp/deploy_ecommerce.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
