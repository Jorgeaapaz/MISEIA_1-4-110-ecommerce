stages:
  - test
  - build
  - deploy

lint-and-test:
  stage: test
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

build:
  stage: build
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm ci
    - export NODE_ENV=production && npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan 34.174.56.186 >> ~/.ssh/known_hosts
  script:
    - |
      ssh gcvmuser@34.174.56.186 << ENDSSH
        set -e
        APP_DIR=~/MISEIA110_ecommerce
        if [ ! -d "\$APP_DIR" ]; then
          git clone https://github.com/Jorgeaapaz/MISEIA_1-4-110-ecommerce.git "\$APP_DIR"
        else
          cd "\$APP_DIR" && git pull origin main
        fi
        cd "\$APP_DIR"
        docker build -t ecommerce:latest .
        docker stop ecommerce 2>/dev/null || true
        docker rm ecommerce 2>/dev/null || true
        docker run -d \
          --name ecommerce \
          --network miseia-net \
          --restart unless-stopped \
          -e MONGODB_URI="$MONGODB_URI" \
          -e MONGODB_DB="$MONGODB_DB" \
          -e AUTH_SECRET="$AUTH_SECRET" \
          -e NEXT_PUBLIC_BASE_URL="$NEXT_PUBLIC_BASE_URL" \
          -e NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" \
          -e STRIPE_PUBLISHABLE_KEY="$STRIPE_PUBLISHABLE_KEY" \
          -e STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
          -e STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
          -l "traefik.enable=true" \
          -l "traefik.http.routers.ecommerce.rule=Host(\`ecommerce.deviaaps.com\`)" \
          -l "traefik.http.routers.ecommerce.entrypoints=websecure" \
          -l "traefik.http.routers.ecommerce.tls=true" \
          -l "traefik.http.routers.ecommerce.tls.certresolver=cloudflare" \
          -l "traefik.http.services.ecommerce.loadbalancer.server.port=30001" \
          ecommerce:latest
        docker ps --filter name=ecommerce --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
      ENDSSH
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
